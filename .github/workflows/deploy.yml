name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Check Secrets 🔍
        run: |
          if [ -z "${{ secrets.VITE_FIREBASE_API_KEY || vars.VITE_FIREBASE_API_KEY }}" ]; then
            echo "VITE_FIREBASE_API_KEY is missing"
          else
            echo "VITE_FIREBASE_API_KEY is set"
          fi
          if [ -z "${{ secrets.VITE_FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID }}" ]; then
            echo "VITE_FIREBASE_PROJECT_ID is missing"
          else
            echo "VITE_FIREBASE_PROJECT_ID is set"
          fi
          if [ -z "${{ secrets.VITE_FIREBASE_APP_ID || vars.VITE_FIREBASE_APP_ID }}" ]; then
            echo "VITE_FIREBASE_APP_ID is missing"
          else
            echo "VITE_FIREBASE_APP_ID is set"
          fi
          if [ -z "${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN }}" ]; then
            echo "VITE_FIREBASE_AUTH_DOMAIN is missing"
          else
            echo "VITE_FIREBASE_AUTH_DOMAIN is set"
          fi
          if [ -z "${{ secrets.VITE_FIREBASE_FIRESTORE_DATABASE_ID || vars.VITE_FIREBASE_FIRESTORE_DATABASE_ID }}" ]; then
            echo "VITE_FIREBASE_FIRESTORE_DATABASE_ID is missing"
          else
            echo "VITE_FIREBASE_FIRESTORE_DATABASE_ID is set"
          fi

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_FIRESTORE_DATABASE_ID: ${{ secrets.VITE_FIREBASE_FIRESTORE_DATABASE_ID || vars.VITE_FIREBASE_FIRESTORE_DATABASE_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ""
          # Detecta automáticamente el nombre del repositorio para el subdirectorio de GitHub Pages
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
